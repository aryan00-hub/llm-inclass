name: integration-tests

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: One-shot CLI arg works
        run: |
          chat "/calculate 9*9" | tee /tmp/oneshot.txt
          grep -q '^81$' /tmp/oneshot.txt
      - name: Debug flag prints tool calls
        run: |
          chat --debug "/ls .github" | tee /tmp/debug.txt
          grep -q '^\[tool\] /ls .github$' /tmp/debug.txt
